<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Config Generator</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
        /* fallback background image if video can't play */
        background-image: url('/background.jpg');
        background-size: cover;
        background-position: center;
      }
      #root {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: transparent;
      }
      .video-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
        pointer-events: none;
      }
      .content {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.35);
        color: #fff;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
